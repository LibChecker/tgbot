name = "tgbot"
main = "src/index.js"
compatibility_date = "2026-04-12"
workers_dev = false
routes = [
  { pattern = "lcbot.absinthe.life", custom_domain = true }
]

[vars]
PUBLIC_WEBHOOK_URL = "https://lcbot.absinthe.life"

[observability]
enabled = true
head_sampling_rate = 1

[version_metadata]
binding = "CF_VERSION_METADATA"

[[analytics_engine_datasets]]
binding = "USAGE_ANALYTICS"
dataset = "Libchecker_TG_Bot"

[env.preview]
name = "tgbot-preview"
workers_dev = true
routes = []

[env.preview.vars]
APP_ENV = "preview"
PUBLIC_WEBHOOK_URL = ""

[env.preview.observability]
enabled = true
head_sampling_rate = 1

[env.preview.version_metadata]
binding = "CF_VERSION_METADATA"

[[env.preview.analytics_engine_datasets]]
binding = "USAGE_ANALYTICS"
dataset = "Libchecker_TG_Bot_Preview"

[env.production]
name = "tgbot"
workers_dev = false
routes = [
  { pattern = "lcbot.absinthe.life", custom_domain = true }
]

[env.production.vars]
APP_ENV = "production"
PUBLIC_WEBHOOK_URL = "https://lcbot.absinthe.life"

[env.production.observability]
enabled = true
head_sampling_rate = 1

[env.production.version_metadata]
binding = "CF_VERSION_METADATA"

[[env.production.analytics_engine_datasets]]
binding = "USAGE_ANALYTICS"
dataset = "Libchecker_TG_Bot"
