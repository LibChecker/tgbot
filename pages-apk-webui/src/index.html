<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>APK 本地分析</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icon_round.svg">
    <script>
      (() => {
        const key = "apk-webui-theme";
        const valid = new Set(["light", "dark", "system"]);
        let choice = "system";
        try {
          const saved = window.localStorage.getItem(key);
          choice = valid.has(saved) ? saved : "system";
        } catch {
          choice = "system";
        }

        const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)")?.matches;
        document.documentElement.dataset.themeChoice = choice;
        document.documentElement.dataset.colorScheme = choice === "system" ? prefersDark ? "dark" : "light" : choice;
      })();
    </script>
    <link rel="stylesheet" href="./app.css?__BUILD_VERSION__">
  </head>
  <body>
    <div class="color-orb-background" id="color-orb-background" aria-hidden="true">
      <span class="color-mesh-spot color-mesh-spot--violet"></span>
      <span class="color-mesh-spot color-mesh-spot--blue"></span>
      <span class="color-mesh-spot color-mesh-spot--rose"></span>
      <span class="color-mesh-spot color-mesh-spot--mint"></span>
      <span class="color-mesh-spot color-mesh-spot--amber"></span>
    </div>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span class="brand-orb">
              <img class="brand-orb__icon" src="./assets/icon_round.svg" alt="">
              <span class="brand-orb__gloss"></span>
            </span>
          </div>
          <div>
            <h1 class="brand-title" data-dot-title="LibChecker WebUI">LibChecker WebUI</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <a class="icon-button topbar-github-link" href="https://github.com/LibChecker/tgbot" target="_blank" rel="noreferrer" aria-label="GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M12 .5A11.5 11.5 0 0 0 8.36 22.9c.58.1.79-.25.79-.56v-2.01c-3.2.7-3.88-1.36-3.88-1.36-.53-1.33-1.28-1.68-1.28-1.68-1.04-.72.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.75 2.69 1.24 3.34.95.1-.74.4-1.24.73-1.53-2.56-.29-5.25-1.28-5.25-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.16 1.18a10.9 10.9 0 0 1 5.76 0c2.19-1.49 3.15-1.18 3.15-1.18.63 1.59.24 2.76.12 3.05.74.81 1.18 1.84 1.18 3.1 0 4.42-2.7 5.39-5.26 5.68.41.36.78 1.06.78 2.14v3.02c0 .31.21.67.8.56A11.5 11.5 0 0 0 12 .5Z"></path>
            </svg>
          </a>
          <div class="mode-chip-group" id="mode-chip-group" role="radiogroup" aria-label="模式" data-aria-i18n="modeLabel">
            <button class="mode-chip is-active" type="button" role="radio" aria-checked="true" data-app-mode="analyze" data-i18n="modeAnalyze">分析</button>
            <button class="mode-chip" type="button" role="radio" aria-checked="false" data-app-mode="compare" data-i18n="modeCompare">对比</button>
          </div>
          <div class="theme-chip-group" id="theme-chip-group" role="radiogroup" aria-label="主题" data-aria-i18n="themeLabel">
            <button class="theme-chip" type="button" role="radio" aria-checked="false" data-theme-choice="dark" data-i18n="themeDark">深色</button>
            <button class="theme-chip" type="button" role="radio" aria-checked="false" data-theme-choice="light" data-i18n="themeLight">浅色</button>
            <button class="theme-chip" type="button" role="radio" aria-checked="true" data-theme-choice="system" data-i18n="themeSystem">系统</button>
          </div>
          <label class="select-control">
            <span class="sr-only" data-i18n="languageLabel">语言</span>
            <svg class="select-control__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 12px; top: 50%; width: 18px; height: 18px; transform: translateY(-50%); pointer-events: none;" aria-hidden="true">
              <circle cx="12" cy="12" r="8.5"></circle>
              <path d="M3.75 12h16.5"></path>
              <path d="M12 3.5c2.1 2.35 3.15 5.18 3.15 8.5s-1.05 6.15-3.15 8.5"></path>
              <path d="M12 3.5C9.9 5.85 8.85 8.68 8.85 12s1.05 6.15 3.15 8.5"></path>
            </svg>
            <select id="language-select"></select>
          </label>
          <button class="icon-button" id="clear-button" type="button" disabled aria-label="清空" data-title-i18n="clear">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8.7 7.3a1 1 0 0 0-1.4 1.4l3.29 3.3-3.3 3.3a1 1 0 1 0 1.42 1.4l3.29-3.29 3.3 3.3a1 1 0 0 0 1.4-1.42L13.42 12l3.3-3.3a1 1 0 1 0-1.42-1.4L12 10.58 8.7 7.3Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <form class="tool-panel" id="analyze-form">
          <label class="drop-zone" id="drop-zone">
            <input id="file-input" name="apk" type="file">
            <span class="drop-zone-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 3a5 5 0 0 1 4.9 4h.1a4 4 0 0 1 0 8h-3a1 1 0 1 1 0-2h3a2 2 0 1 0 0-4h-.9a1 1 0 0 1-1-.86A3 3 0 0 0 9.2 7.1a1 1 0 0 1-.9.56H8a3 3 0 1 0 0 6h2a1 1 0 1 1 0 2H8A5 5 0 0 1 7.4 5.7 5 5 0 0 1 12 3Zm0 8a1 1 0 0 1 1 1v5.59l1.3-1.29a1 1 0 0 1 1.4 1.42l-3 3a1 1 0 0 1-1.4 0l-3-3a1 1 0 1 1 1.4-1.42l1.3 1.3V12a1 1 0 0 1 1-1Z"></path>
              </svg>
            </span>
            <span>
              <span class="drop-zone-title" data-i18n="filePrompt">选择或拖入 APK</span>
              <span class="drop-zone-meta" id="file-meta" data-i18n="fileIdle">未选择文件</span>
            </span>
          </label>
          <div class="tool-panel-actions">
            <button class="primary-button" id="analyze-button" type="submit" disabled>
              <span data-i18n="analyze">开始分析</span>
            </button>
            <p class="local-note" data-i18n="localNote">文件只在当前浏览器中解析</p>
          </div>
          <div class="progress" id="progress" hidden aria-live="polite">
            <div class="progress-header">
              <span id="progress-label" data-i18n="progressReady">等待文件</span>
              <span id="progress-time">0.0s</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar"></div>
            </div>
          </div>
          <div class="alert" id="error-box" hidden role="alert"></div>
        </form>

        <section class="history-panel" id="history-panel">
          <div class="history-panel-header">
            <div class="history-heading">
              <button class="icon-button history-toggle" id="history-toggle-button" type="button" aria-expanded="true" aria-controls="history-content" aria-label="收起历史" data-title-i18n="historyCollapse">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7.3 9.3a1 1 0 0 1 1.4 0L12 12.58l3.3-3.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 0 1 0-1.4Z"></path>
                </svg>
              </button>
              <div>
              <h2 data-i18n="historyTitle">历史记录</h2>
              <p data-i18n="historyNote">保存在当前浏览器中，点击记录可重新打开结果</p>
              </div>
            </div>
            <button class="secondary-button" id="clear-history-button" type="button" data-i18n="clearHistory">清空历史</button>
          </div>
          <div class="history-content" id="history-content">
            <div class="history-list" id="history-list"></div>
          </div>
        </section>

        <section class="empty-state" id="empty-state">
          <div class="empty-state-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm6 2H7v14h10V9h-4V5Zm-3 8h4a1 1 0 1 1 0 2h-4a1 1 0 1 1 0-2Zm0 3h4a1 1 0 1 1 0 2h-4a1 1 0 1 1 0-2Z"></path>
            </svg>
          </div>
          <div class="empty-state-copy">
            <h2 data-i18n="emptyTitle">等待 APK</h2>
            <p data-i18n="emptyBody">分析完成后会在这里展示摘要、SDK 标记、组件、权限、签名和元数据</p>
          </div>
        </section>

        <section class="result-view" id="result-view" hidden>
          <div class="report-hero" id="report-hero"></div>
          <nav class="tabs" id="tabs" role="tablist" aria-label="Report tabs">
            <button type="button" class="tab is-active" data-tab="summary" role="tab" aria-selected="true" data-i18n="tabSummary">摘要</button>
            <button type="button" class="tab" data-tab="sdk" role="tab" aria-selected="false" data-i18n="tabSdk">SDK</button>
            <button type="button" class="tab" data-tab="native" role="tab" aria-selected="false" data-i18n="tabNative">原生库</button>
            <button type="button" class="tab" data-tab="components" role="tab" aria-selected="false" data-i18n="tabComponents">组件</button>
            <button type="button" class="tab" data-tab="permissions" role="tab" aria-selected="false" data-i18n="tabPermissions">权限</button>
            <button type="button" class="tab" data-tab="signatures" role="tab" aria-selected="false" data-i18n="tabSignatures">签名</button>
            <button type="button" class="tab" data-tab="metadata" role="tab" aria-selected="false" data-i18n="tabMeta">元数据</button>
            <button type="button" class="tab" data-tab="raw" role="tab" aria-selected="false" data-i18n="tabRaw">JSON</button>
          </nav>
          <div class="tab-panel" id="tab-panel" role="tabpanel"></div>
        </section>

        <section class="compare-view" id="compare-view" hidden>
          <div class="compare-slots" id="compare-slots">
            <article class="compare-slot" data-compare-slot="left">
              <div class="compare-slot-header">
                <div>
                  <h2 data-i18n="compareSlotLeft">左侧 APK</h2>
                  <p data-i18n="compareSlotNote">拖入文件，或从历史记录选择</p>
                </div>
                <button class="icon-button compare-slot-clear" type="button" data-compare-clear="left" aria-label="清空左侧" data-title-i18n="compareClearLeft">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8.7 7.3a1 1 0 0 0-1.4 1.4l3.29 3.3-3.3 3.3a1 1 0 1 0 1.42 1.4l3.29-3.29 3.3 3.3a1 1 0 0 0 1.4-1.42L13.42 12l3.3-3.3a1 1 0 1 0-1.42-1.4L12 10.58 8.7 7.3Z"></path>
                  </svg>
                </button>
              </div>
              <label class="compare-drop-zone" data-compare-drop="left">
                <input class="compare-file-input" data-compare-file="left" type="file" accept=".apk,application/vnd.android.package-archive">
                <span class="drop-zone-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M12 3a5 5 0 0 1 4.9 4h.1a4 4 0 0 1 0 8h-3a1 1 0 1 1 0-2h3a2 2 0 1 0 0-4h-.9a1 1 0 0 1-1-.86A3 3 0 0 0 9.2 7.1a1 1 0 0 1-.9.56H8a3 3 0 1 0 0 6h2a1 1 0 1 1 0 2H8A5 5 0 0 1 7.4 5.7 5 5 0 0 1 12 3Zm0 8a1 1 0 0 1 1 1v5.59l1.3-1.29a1 1 0 0 1 1.4 1.42l-3 3a1 1 0 0 1-1.4 0l-3-3a1 1 0 1 1 1.4-1.42l1.3 1.3V12a1 1 0 0 1 1-1Z"></path>
                  </svg>
                </span>
                <span>
                  <span class="drop-zone-title" data-i18n="compareDropPrompt">点击上传或拖入 APK</span>
                  <span class="drop-zone-meta" data-compare-file-meta="left" data-i18n="compareSlotEmpty">未选择 APK</span>
                </span>
              </label>
              <label class="compare-history-control">
                <span data-i18n="compareHistoryLabel">历史记录</span>
                <select data-compare-history="left"></select>
              </label>
              <div class="compare-slot-report" data-compare-slot-report="left"></div>
            </article>

            <article class="compare-slot" data-compare-slot="right">
              <div class="compare-slot-header">
                <div>
                  <h2 data-i18n="compareSlotRight">右侧 APK</h2>
                  <p data-i18n="compareSlotNote">拖入文件，或从历史记录选择</p>
                </div>
                <button class="icon-button compare-slot-clear" type="button" data-compare-clear="right" aria-label="清空右侧" data-title-i18n="compareClearRight">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8.7 7.3a1 1 0 0 0-1.4 1.4l3.29 3.3-3.3 3.3a1 1 0 1 0 1.42 1.4l3.29-3.29 3.3 3.3a1 1 0 0 0 1.4-1.42L13.42 12l3.3-3.3a1 1 0 1 0-1.42-1.4L12 10.58 8.7 7.3Z"></path>
                  </svg>
                </button>
              </div>
              <label class="compare-drop-zone" data-compare-drop="right">
                <input class="compare-file-input" data-compare-file="right" type="file" accept=".apk,application/vnd.android.package-archive">
                <span class="drop-zone-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M12 3a5 5 0 0 1 4.9 4h.1a4 4 0 0 1 0 8h-3a1 1 0 1 1 0-2h3a2 2 0 1 0 0-4h-.9a1 1 0 0 1-1-.86A3 3 0 0 0 9.2 7.1a1 1 0 0 1-.9.56H8a3 3 0 1 0 0 6h2a1 1 0 1 1 0 2H8A5 5 0 0 1 7.4 5.7 5 5 0 0 1 12 3Zm0 8a1 1 0 0 1 1 1v5.59l1.3-1.29a1 1 0 0 1 1.4 1.42l-3 3a1 1 0 0 1-1.4 0l-3-3a1 1 0 1 1 1.4-1.42l1.3 1.3V12a1 1 0 0 1 1-1Z"></path>
                  </svg>
                </span>
                <span>
                  <span class="drop-zone-title" data-i18n="compareDropPrompt">点击上传或拖入 APK</span>
                  <span class="drop-zone-meta" data-compare-file-meta="right" data-i18n="compareSlotEmpty">未选择 APK</span>
                </span>
              </label>
              <label class="compare-history-control">
                <span data-i18n="compareHistoryLabel">历史记录</span>
                <select data-compare-history="right"></select>
              </label>
              <div class="compare-slot-report" data-compare-slot-report="right"></div>
            </article>
          </div>
          <div class="warning-note compare-warning" id="compare-warning" hidden></div>
          <div class="compare-result" id="compare-result"></div>
        </section>
      </main>
    </div>
    <script type="module" src="./app.js?__BUILD_VERSION__"></script>
  </body>
</html>
